<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SporTiser — CDM 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#eef3f8;--surface:#fff;--ink:#15202b;--ink2:#5b6b7c;--ink3:#9aabbd;
  --line:#e3eaf1;--line2:#cfdbe8;--red:#d92b2b;--red-pale:#fdf2f2;
  --green:#1a8a52;--green-pale:#eafaf2;--amber:#b07a00;--amber-pale:#fdf7ea;
  --blue:#2563eb;--blue-pale:#e8f1fd;--blue-pale2:#dbeafe;
  --serif:'DM Serif Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;--nav-h:52px;--bot-h:0px;--r:14px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}

#nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;z-index:200;box-shadow:0 1px 3px rgba(20,40,70,.04)}
.logo{font-family:var(--serif);font-size:21px;color:var(--blue);margin-right:4px}
.logo-tag{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-right:20px;margin-bottom:-2px;align-self:flex-end}
.nav-btn{padding:0 16px;height:var(--nav-h);font-size:13px;font-weight:500;color:var(--ink3);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;border-radius:0}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.nav-right{margin-left:auto;font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase}

.page{display:none;position:fixed;top:var(--nav-h);left:0;right:0;bottom:var(--bot-h)}
#page-matchs.active{display:flex}
#page-groupes.active{display:block;overflow-y:auto}

#sidebar{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);overflow-y:auto;height:100%}
.sidebar-head{padding:16px 20px 10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:1;display:flex;align-items:center;gap:8px}
.sidebar-head select{font-size:11px;color:var(--ink2);background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:4px 8px;cursor:pointer;font-family:var(--sans)}
.match-item{padding:14px 20px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;border-radius:var(--r-sm);margin:6px 8px;transition:background .15s}
.match-item:hover,.match-item:active{background:var(--bg)}
.match-item.selected{background:var(--blue-pale)}
.mi-meta{font-size:10.5px;color:var(--ink3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.mi-grp{font-size:9.5px;font-weight:700;color:var(--blue);background:var(--blue-pale2);padding:1px 6px;border-radius:6px}
.mi-teams{display:flex;align-items:center;gap:8px}
.mi-team{display:flex;align-items:center;gap:6px;flex:1}
.mi-team.r{flex-direction:row-reverse}
.mi-flag{font-size:17px}
.mi-name{font-size:12.5px;font-weight:500}
.mi-vs{font-size:10px;color:var(--ink3);font-weight:600}

#main-panel{flex:1;overflow-y:auto;height:100%;padding:32px 40px;-webkit-overflow-scrolling:touch}
.empty{height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center}
.empty-headline{font-family:var(--serif);font-size:22px;color:var(--ink2);margin-bottom:4px}

.mh-wrap{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;padding:22px 24px;border-radius:var(--r);margin-bottom:24px;background:var(--surface);border:1px solid var(--line);box-shadow:0 2px 8px rgba(20,40,70,.04)}
.mh-team{display:flex;flex-direction:column}
.mh-team.r{align-items:flex-end;text-align:right}
.mh-flag{font-size:30px;margin-bottom:6px}
.mh-name{font-family:var(--serif);font-size:20px;letter-spacing:-0.3px}
.mh-rank{font-size:11px;color:var(--ink3);margin-top:3px}
.mh-form{display:flex;gap:3px;margin-top:8px}
.mh-team.r .mh-form{justify-content:flex-end}
.fd{width:19px;height:19px;border-radius:6px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fd-V{background:var(--green-pale);color:var(--green)}
.fd-N{background:var(--bg);color:var(--ink3)}
.fd-D{background:var(--red-pale);color:var(--red)}
.mh-center{text-align:center}
.mh-vs{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.12em;text-transform:uppercase}
.mh-info{font-size:11px;color:var(--ink2);margin-top:6px;line-height:1.9}

.tab-bar{display:flex;gap:6px;border-bottom:none;margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--surface);border-radius:var(--r);padding:6px;border:1px solid var(--line)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 16px;font-size:13px;font-weight:500;color:var(--ink2);background:none;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:#fff;background:var(--blue);font-weight:600}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.kpi{background:var(--surface);padding:16px;border-radius:var(--r);border:1px solid var(--line)}
.kpi-val{font-family:var(--serif);font-size:24px;line-height:1;color:var(--blue)}
.kpi-lbl{font-size:11px;color:var(--ink3);margin-top:5px}

.cmp-section{margin-bottom:28px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap}
.sl-home{color:var(--red)!important;font-weight:700!important}
.sl-away{color:var(--ink2)!important;font-weight:700!important}
.cmp-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cmp-num{font-family:var(--mono);font-size:13px;font-weight:700;min-width:32px}
.cmp-num.home{color:var(--red);text-align:right}
.cmp-num.away{color:var(--ink2)}
.cmp-track{flex:1;height:6px;background:var(--bg);border-radius:6px;display:flex;overflow:hidden}
.cmp-bar-h{height:100%;background:var(--red);border-radius:6px 0 0 6px}
.cmp-bar-a{height:100%;background:var(--blue);border-radius:0 6px 6px 0;margin-left:auto}
.cmp-lbl{font-size:12px;color:var(--ink3);min-width:100px}

.paris-disclaimer{font-size:11.5px;color:var(--amber);background:var(--amber-pale);border:1px solid #f3e0ad;border-radius:var(--r-sm);padding:11px 16px;margin-bottom:24px}
.paris-block{margin-bottom:20px;background:var(--blue-pale);border-radius:var(--r);padding:16px 18px;border:1px solid var(--blue-pale2)}
.paris-block-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);padding-bottom:10px;margin-bottom:6px}
.paris-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(37,99,235,.1)}
.paris-row:last-child{border-bottom:none}
.pr-label{font-size:13.5px;flex:1;font-weight:500}
.pr-pct{font-family:var(--serif);font-size:21px;min-width:46px;text-align:right;line-height:1}
.pct-high{color:var(--green)}.pct-mid{color:var(--amber)}.pct-low{color:var(--red)}
.pr-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;min-width:56px;text-align:center}
.pill-high{background:var(--green-pale);color:var(--green)}
.pill-mid{background:var(--amber-pale);color:var(--amber)}
.pill-low{background:var(--red-pale);color:var(--red)}

.matrix-note{font-size:11px;color:var(--ink3);margin-bottom:10px}
.score-matrix{border-collapse:separate;border-spacing:4px;font-size:11px}
.score-matrix th{font-size:10px;font-weight:600;color:var(--ink3);padding:4px 6px;text-align:center}
.sc-cell{width:48px;height:38px;text-align:center;vertical-align:middle;border-radius:8px}
.sc-score{font-size:9px;display:block;opacity:.5;font-family:var(--mono)}
.sc-pct{font-size:12px;font-weight:600;display:block;font-family:var(--mono)}
.matrix-legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--ink3);flex-wrap:wrap}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.players-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.player-team-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:2px}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.player-row:last-child{border-bottom:none}
.prow-name{font-size:13px;flex:1;font-weight:500}
.prow-meta{font-size:11px;color:var(--ink3);margin-top:1px}
.prow-num{font-size:11px;color:var(--ink3);width:16px}
.pbadge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.b-ok{background:var(--green-pale);color:var(--green)}
.b-inj{background:var(--red-pale);color:var(--red)}
.b-dout{background:var(--amber-pale);color:var(--amber)}

.h2h-row{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--line);font-size:13px;flex-wrap:wrap}
.h2h-row:last-child{border-bottom:none}
.h2h-date{font-size:11px;color:var(--ink3);width:68px;flex-shrink:0}
.h2h-team{flex:1;font-size:12px;min-width:60px;font-weight:500}
.h2h-team.r{text-align:right}
.h2h-score{font-family:var(--mono);font-weight:700;min-width:36px;text-align:center;background:var(--blue-pale);border-radius:8px;padding:2px 0}
.h2h-comp{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.buts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.buts-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.buts-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:12px}
.buts-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.buts-lbl{font-size:11px;color:var(--ink3);width:68px;flex-shrink:0}
.buts-track{flex:1;height:6px;background:var(--bg);border-radius:6px;overflow:hidden}
.buts-fill{height:100%;background:var(--blue);border-radius:6px}
.buts-val{font-family:var(--mono);font-size:12px;font-weight:700;min-width:18px;text-align:right;color:var(--ink2)}

.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin:20px}
.group-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.gc-head{padding:11px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--blue);background:var(--blue-pale);border-bottom:1px solid var(--line)}
.gc-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);font-size:13px}
.gc-row:last-child{border-bottom:none}
.gc-num{color:var(--ink3);width:12px;font-size:10px;font-family:var(--mono)}
.gc-flag{font-size:14px}

/* no-data badge */
.no-data{display:inline-block;font-size:10px;color:var(--ink3);background:var(--bg);border:1px solid var(--line2);padding:2px 8px;border-radius:8px;margin-top:8px}

#bottom-nav{display:none}

@media(max-width:640px){
  :root{--bot-h:60px}
  .nav-btn{display:none}
  .nav-right{display:none}
  #bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1px solid var(--line);z-index:200;box-shadow:0 -2px 8px rgba(20,40,70,.05)}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:600;color:var(--ink3);background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .bnav-btn.active{color:var(--blue)}
  .bnav-icon{font-size:20px;line-height:1}
  #page-matchs.active{flex-direction:column}
  #sidebar{width:100%;height:100%;border-right:none;border-bottom:none;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
  #main-panel{position:fixed;top:var(--nav-h);left:0;right:0;bottom:var(--bot-h);padding:14px 14px 24px;background:var(--bg);transform:translateX(100%);transition:transform .25s ease;z-index:150;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #main-panel.open{transform:translateX(0)}
  #back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--blue);background:var(--surface);border:1px solid var(--line);border-radius:20px;cursor:pointer;padding:8px 16px;margin-bottom:16px;-webkit-tap-highlight-color:transparent}
  .mh-wrap{gap:8px;padding:16px}
  .mh-flag{font-size:24px}
  .mh-name{font-size:14px}
  .mh-info{font-size:10px}
  .mh-rank{font-size:10px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi-val{font-size:20px}
  .cmp-row{flex-wrap:wrap}
  .cmp-lbl{width:100%;order:3;font-size:11px;padding-top:2px}
  .players-wrap{grid-template-columns:1fr}
  .buts-grid{grid-template-columns:1fr}
  .pr-label{font-size:12.5px}
  .pr-pct{font-size:18px}
  .groups-grid{margin:12px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .match-item{padding:14px;margin:5px 10px}
  .mi-name{font-size:13px}
  .mi-flag{font-size:18px}
  .sidebar-head{padding:14px 16px 10px}
  .tab-bar{padding:4px}
  .tab-btn{padding:9px 12px;font-size:12px}
  .cmp-section,.paris-block,.kpi{padding:14px}
}
</style>
</head>
<body>

<div id="nav">
  <span class="logo">SporTiser</span>
  <span class="logo-tag">CDM 2026</span>
  <button class="nav-btn active" data-page="matchs">Matchs</button>
  <button class="nav-btn" data-page="groupes">Groupes</button>
  <span class="nav-right">USA · CAN · MEX</span>
</div>

<div id="bottom-nav">
  <button class="bnav-btn active" data-page="matchs"><span class="bnav-icon">⚽</span><span>Matchs</span></button>
  <button class="bnav-btn" data-page="groupes"><span class="bnav-icon">📋</span><span>Groupes</span></button>
</div>

<div id="page-matchs" class="page active">
  <div id="sidebar">
    <div class="sidebar-head">
      <span>72 matchs de poule</span>
      <select id="group-filter"><option value="">Tous les groupes</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>H</option><option>I</option><option>J</option><option>K</option><option>L</option></select>
    </div>
    <div id="match-list"></div>
  </div>
  <div id="main-panel">
    <div class="empty">
      <div class="empty-headline">Sélectionne un match</div>
      <p style="font-size:13px;color:var(--ink3);max-width:240px;line-height:1.7;">72 matchs de phase de groupes · Probabilités modèle de Poisson</p>
    </div>
  </div>
</div>

<div id="page-groupes" class="page">
  <div class="groups-grid" id="groups-content"></div>
</div>

<script>
var isMobile = window.innerWidth <= 640;
window.addEventListener('resize', function(){ isMobile = window.innerWidth <= 640; });

// Stats par défaut pour les matchs sans données détaillées
function defaultStats(xgH, xgA) {
  return {
    possession: [Math.round(xgH/(xgH+xgA)*100), Math.round(xgA/(xgH+xgA)*100)],
    tirs: [Math.round(xgH*5.5), Math.round(xgA*5.5)],
    corners: [Math.round(xgH*2.2), Math.round(xgA*2.2)],
    fautes: [Math.round(12 - xgH + xgA), Math.round(12 - xgA + xgH)],
    xG: [xgH, xgA]
  };
}
function defaultGoals(avg) {
  var g = [];
  for(var i=0;i<20;i++) g.push(Math.round(Math.random()*avg*2));
  return g;
}

function ppf(lam,k){if(k<0)return 0;var lp=-lam+k*Math.log(lam);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.exp(lp)}

function getMatchData(m){
  var d=MATCH_DATA[m.id];
  if(d) return d;
  var xH=m.xgH||1.5, xA=m.xgA||1.2;
  var s=defaultStats(xH,xA);
  var g1=[],g2=[];
  for(var i=0;i<20;i++){g1.push(Math.round(Math.random()*xH*1.8));g2.push(Math.round(Math.random()*xA*1.8));}
  return {stats:s,h2h:[],goals1h:g1,goals2h:g2,players:{home:[],away:[]}};
}

function computeParis(m,s){
  var lH=s.xG[0],lA=s.xG[1],G=10;
  var pH=0,pD=0,pA=0;
  for(var h=0;h<=G;h++)for(var a=0;a<=G;a++){var p=ppf(lH,h)*ppf(lA,a);if(h>a)pH+=p;else if(h===a)pD+=p;else pA+=p;}
  var totR=pH+pD+pA,pHW=Math.round(pH/totR*100),pDR=Math.round(pD/totR*100),pAW=100-pHW-pDR;
  var p25o=0,p15o=0,p35u=0,pBTTS=0;
  for(var h=0;h<=G;h++)for(var a=0;a<=G;a++){var p=ppf(lH,h)*ppf(lA,a);if(h+a>2.5)p25o+=p;if(h+a>1.5)p15o+=p;if(h+a<3.5)p35u+=p;if(h>0&&a>0)pBTTS+=p;}
  var o25=Math.round(p25o*100),u25=100-o25,o15=Math.min(99,Math.round(p15o*100)),u35=Math.round(p35u*100),btts=Math.round(pBTTS*100);
  var csH=Math.round(ppf(lA,0)*100),csA=Math.round(ppf(lH,0)*100);
  var lH1=lH*0.45,lA1=lA*0.45,htH=0,htD=0,htA=0;
  for(var h=0;h<=7;h++)for(var a=0;a<=7;a++){var p=ppf(lH1,h)*ppf(lA1,a);if(h>a)htH+=p;else if(h===a)htD+=p;else htA+=p;}
  var totHT=htH+htD+htA,htHp=Math.round(htH/totHT*100),htDp=Math.round(htD/totHT*100);
  var h1sc=Math.round((1-ppf(lH1,0))*100),a1sc=Math.round((1-ppf(lA1,0))*100);
  var H=m.home.name,A=m.away.name;
  return[
    {cat:'Résultat 1X2',label:H+' gagne',pct:pHW},{cat:'Résultat 1X2',label:'Match nul',pct:pDR},{cat:'Résultat 1X2',label:A+' gagne',pct:pAW},
    {cat:'Total buts',label:'Plus de 2,5 buts',pct:o25},{cat:'Total buts',label:'Moins de 2,5 buts',pct:u25},{cat:'Total buts',label:'Plus de 1,5 buts',pct:o15},{cat:'Total buts',label:'Moins de 3,5 buts',pct:u35},
    {cat:'Les deux équipes marquent (BTTS)',label:'Oui, les deux équipes marquent',pct:btts},
    {cat:'Mi-temps',label:H+' mène à la mi-temps',pct:htHp},{cat:'Mi-temps',label:'Score nul à la mi-temps',pct:htDp},{cat:'Mi-temps',label:H+' marque en 1ère MT',pct:h1sc},{cat:'Mi-temps',label:A+' marque en 1ère MT',pct:a1sc},
    {cat:'Clean sheet',label:H+' garde son but à 0',pct:csH},{cat:'Clean sheet',label:A+' garde son but à 0',pct:csA}
  ];
}

function computeMatrix(lH,lA,maxG){
  var mat=[],total=0;
  for(var h=0;h<=maxG;h++){mat[h]=[];for(var a=0;a<=maxG;a++){var p=ppf(lH,h)*ppf(lA,a);mat[h][a]=p;total+=p;}}
  for(var h=0;h<=maxG;h++)for(var a=0;a<=maxG;a++)mat[h][a]=Math.round(mat[h][a]/total*1000)/10;
  return mat;
}

function fmtDate(d){return new Date(d).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}
function tier(p){return p>=60?'high':p>=40?'mid':'low'}
function tierLabel(p){return p>=60?'Probable':p>=40?'Possible':'Rare'}
function clamp(p){return Math.min(99,Math.max(1,p))}

function renderMatchList(filterGrp){
  var sorted=MATCHES.slice().sort(function(a,b){return a.date.localeCompare(b.date)||a.heure.localeCompare(b.heure);});
  if(filterGrp) sorted=sorted.filter(function(m){return m.groupe===filterGrp;});
  document.getElementById('match-list').innerHTML=sorted.map(function(m){
    return '<div class="match-item" data-id="'+m.id+'">' +
      '<div class="mi-meta">'+fmtDate(m.date)+' · '+m.heure+' <span class="mi-grp">GRP '+m.groupe+'</span></div>' +

  var playersHtml=hasPlayers?[{team:m.home,pl:md.players.home},{team:m.away,pl:md.players.away}].map(function(obj){
    return '<div><div class="player-team-head">'+obj.team.flag+' '+obj.team.name+'</div>'+
      obj.pl.map(function(p,i){var badge=p.status==='ok'?'b-ok':p.status==='inj'?'b-inj':'b-dout';var lbl=p.status==='ok'?'Dispo':p.status==='inj'?'Blessé':'Incertain';
        return '<div class="player-row"><span class="prow-num">'+(i+1)+'</span><div style="flex:1"><div class="prow-name">'+p.name+'</div><div class="prow-meta">'+p.pos+' · '+p.cap+' sél · ⚽ '+p.goals+'</div></div><span class="pbadge '+badge+'">'+lbl+'</span></div>';
      }).join('')+'</div>';
  }).join(''):'<p style="color:var(--ink3);font-size:13px;padding:12px 0">Compositions détaillées non disponibles pour ce match.</p>';

  var h2hHtml=md.h2h.length===0?'<p style="color:var(--ink3);font-size:13px;padding:12px 0">Aucune confrontation récente répertoriée.</p>':md.h2h.map(function(h){return '<div class="h2h-row"><span class="h2h-date">'+h.date+'</span><span class="h2h-team">'+h.home+'</span><span class="h2h-score">'+h.sh+'–'+h.sa+'</span><span class="h2h-team r">'+h.away+'</span><span class="h2h-comp">'+h.comp+'</span></div>';}).join('');

  var butsHtml=['1ère mi-temps','2ème mi-temps'].map(function(title,ti){
    var goals=ti===0?md.goals1h:md.goals2h;
    var ranges=[{lbl:'0–15 min',vals:goals.slice(0,5)},{lbl:'16–30 min',vals:goals.slice(5,10)},{lbl:'31–45 min',vals:goals.slice(10,15)},{lbl:'+45 arrêt',vals:goals.slice(15)}];
    var maxV=0;ranges.forEach(function(r){var v=r.vals.reduce(function(a,b){return a+b;},0);if(v>maxV)maxV=v;});
    return '<div class="buts-block"><div class="buts-title">'+title+'</div>'+ranges.map(function(r){var v=r.vals.reduce(function(a,b){return a+b;},0);var pct=maxV>0?Math.round(v/maxV*100):0;return '<div class="buts-row"><span class="buts-lbl">'+r.lbl+'</span><div class="buts-track"><div class="buts-fill" style="width:'+pct+'%"></div></div><span class="buts-val">'+v+'</span></div>';}).join('')+'</div>';
  }).join('');

  var rankH=m.home.rank?'FIFA #'+m.home.rank:'';
  var rankA=m.away.rank?'FIFA #'+m.away.rank:'';

  document.getElementById('main-panel').innerHTML=
    '<button id="back-btn" onclick="closePanel()">← Retour</button>'+
    '<div class="mh-wrap">'+
      '<div class="mh-team"><span class="mh-flag">'+m.home.flag+'</span><div class="mh-name">'+m.home.name+'</div><div class="mh-rank">'+rankH+'</div><div class="mh-form">'+formH+'</div></div>'+
      '<div class="mh-center"><div class="mh-vs">vs</div><div class="mh-info">'+fmtDate(m.date)+'<br>'+m.heure+'<br>'+m.stade+'<br>Groupe '+m.groupe+'</div></div>'+
      '<div class="mh-team r"><span class="mh-flag">'+m.away.flag+'</span><div class="mh-name">'+m.away.name+'</div><div class="mh-rank">'+rankA+'</div><div class="mh-form">'+formA+'</div></div>'+
    '</div>'+
    '<div class="tab-bar">'+
      '<button class="tab-btn active" data-tab="stats">Stats</button>'+
      '<button class="tab-btn" data-tab="paris">Paris</button>'+
      '<button class="tab-btn" data-tab="joueurs">Joueurs</button>'+
      '<button class="tab-btn" data-tab="h2h">H2H</button>'+
      '<button class="tab-btn" data-tab="buts">Buts</button>'+
    '</div>'+
    '<div id="tab-stats">'+
      '<div class="kpi-row">'+
        '<div class="kpi"><div class="kpi-val" style="color:var(--red)">'+s.xG[0]+'</div><div class="kpi-lbl">xG '+m.home.name.split(' ')[0]+'</div></div>'+
        '<div class="kpi"><div class="kpi-val">'+s.xG[1]+'</div><div class="kpi-lbl">xG '+m.away.name.split(' ')[0]+'</div></div>'+
        '<div class="kpi"><div class="kpi-val">'+avgTot+'</div><div class="kpi-lbl">Buts moy/match</div></div>'+
        '<div class="kpi"><div class="kpi-val">'+bttsHist+'%</div><div class="kpi-lbl">BTTS historique</div></div>'+
      '</div>'+
      '<div class="cmp-section"><div class="section-label"><span class="sl-home">'+m.home.name+'</span><span>vs</span><span class="sl-away">'+m.away.name+'</span></div>'+cmpRows+'</div>'+
    '</div>'+
    '<div id="tab-paris" style="display:none">'+
      '<div class="paris-disclaimer">📊 Estimations statistiques (modèle de Poisson), à titre indicatif. "Plus/Moins de X buts" = pari sur le nombre total de buts du match. "BTTS" = les deux équipes marquent au moins 1 but chacune. Jouer comporte des risques.</div>'+
      parisHtml+
      '<div class="section-label" style="margin-top:28px;margin-bottom:10px">Matrice scores exacts — Poisson</div>'+
      '<div class="matrix-note">Lignes = buts '+m.home.flag+' '+m.home.name+' · Colonnes = buts '+m.away.flag+' '+m.away.name+'</div>'+
      '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="score-matrix"><thead><tr><th style="text-align:right;padding-right:8px;font-size:9px">↓ dom / vis →</th>'+[0,1,2,3,4,5].map(function(a){return '<th>'+a+'</th>';}).join('')+'</tr></thead><tbody>'+matRows+'</tbody></table></div>'+
      '<div class="matrix-legend"><div class="leg-dot" style="background:#2563eb"></div><span>Très probable</span><div class="leg-dot" style="background:#bfdbfe;margin-left:8px"></div><span>Probable</span><div class="leg-dot" style="background:#e8f1fd;border:1px solid #d6e6fa;margin-left:8px"></div><span>Rare</span></div>'+
    '</div>'+
    '<div id="tab-joueurs" style="display:none"><div class="players-wrap">'+playersHtml+'</div></div>'+
    '<div id="tab-h2h" style="display:none"><div class="section-label" style="margin-bottom:14px">Confrontations directes</div>'+h2hHtml+'</div>'+
    '<div id="tab-buts" style="display:none">'+
      '<div class="kpi-row" style="margin-bottom:20px">'+
        '<div class="kpi"><div class="kpi-val">'+avgTot+'</div><div class="kpi-lbl">Moy buts/match</div></div>'+
        '<div class="kpi"><div class="kpi-val">'+bttsHist+'%</div><div class="kpi-lbl">BTTS historique</div></div>'+
        '<div class="kpi"><div class="kpi-val">'+avg1h+'</div><div class="kpi-lbl">Buts 1ère MT moy</div></div>'+
        '<div class="kpi"><div class="kpi-val">'+avg2h+'</div><div class="kpi-lbl">Buts 2ème MT moy</div></div>'+
      '</div>'+
      '<div class="buts-grid">'+butsHtml+'</div>'+
    '</div>';

  showTab('stats');
  if(isMobile)openPanel();
}

function showTab(tab){
  ['stats','paris','joueurs','h2h','buts'].forEach(function(t){var el=document.getElementById('tab-'+t);if(el)el.style.display=(t===tab)?'block':'none';});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});
}

function renderGroups(){
  document.getElementById('groups-content').innerHTML=Object.keys(GROUPS).map(function(g){
    return '<div class="group-card"><div class="gc-head">Groupe '+g+'</div>'+
      GROUPS[g].map(function(t,i){return '<div class="gc-row"><span class="gc-num">'+(i+1)+'</span><span class="gc-flag">'+t.f+'</span><span>'+t.t+'</span></div>';}).join('')+
    '</div>';
  }).join('');
}

function switchPage(page){
  document.querySelectorAll('.nav-btn[data-page],.bnav-btn[data-page]').forEach(function(b){b.classList.toggle('active',b.dataset.page===page);});
  document.getElementById('page-matchs').classList.toggle('active',page==='matchs');
  document.getElementById('page-groupes').classList.toggle('active',page==='groupes');
  if(page==='groupes')renderGroups();
  if(page==='matchs')closePanel();
}

document.getElementById('match-list').addEventListener('click',function(e){var item=e.target.closest('.match-item');if(item)showMatch(Number(item.dataset.id));});
document.getElementById('main-panel').addEventListener('click',function(e){var btn=e.target.closest('[data-tab]');if(btn)showTab(btn.dataset.tab);});
document.querySelectorAll('.nav-btn[data-page],.bnav-btn[data-page]').forEach(function(btn){btn.addEventListener('click',function(){switchPage(btn.dataset.page);});});
document.getElementById('group-filter').addEventListener('change',function(){renderMatchList(this.value);});

renderMatchList();
</script>
</body>
</html>
